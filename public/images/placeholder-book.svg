<svg viewBox="0 0 200 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="300" fill="#f5f5f4"/>
  
  <!-- Book shape -->
  <rect x="30" y="40" width="140" height="220" fill="#e5e7eb" stroke="#d1d5db" stroke-width="2" rx="4"/>
  
  <!-- Book spine -->
  <rect x="28" y="42" width="4" height="216" fill="#d1d5db"/>
  
  <!-- Book pages effect -->
  <line x1="35" y1="50" x2="160" y2="50" stroke="#d1d5db" stroke-width="1"/>
  <line x1="35" y1="60" x2="160" y2="60" stroke="#d1d5db" stroke-width="1"/>
  
  <!-- Icon (book) -->
  <g transform="translate(50, 100)">
    <path d="M 30 10 L 10 25 L 10 85 L 30 100 L 50 85 L 50 25 Z" fill="#9ca3af" stroke="#6b7280" stroke-width="2"/>
    <line x1="30" y1="10" x2="30" y2="100" stroke="#6b7280" stroke-width="2"/>
    <line x1="20" y1="40" x2="40" y2="40" stroke="#f5f5f4" stroke-width="1.5"/>
    <line x1="20" y1="55" x2="40" y2="55" stroke="#f5f5f4" stroke-width="1.5"/>
    <line x1="20" y1="70" x2="40" y2="70" stroke="#f5f5f4" stroke-width="1.5"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="280" font-family="Arial, sans-serif" font-size="12" fill="#9ca3af" text-anchor="middle" font-weight="bold">
    Tidak Ada Sampul
  </text>
</svg>